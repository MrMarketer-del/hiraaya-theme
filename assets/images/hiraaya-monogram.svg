<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
    <!-- Outer Mandala Circle -->
    <circle cx="100" cy="100" r="90" fill="none" stroke="#C5A059" stroke-width="2" />
    
    <!-- Inner Fine Dashed Circle -->
    <circle cx="100" cy="100" r="82" fill="none" stroke="#C5A059" stroke-width="0.75" stroke-dasharray="4,4" opacity="0.8" />
    
    <!-- Decorative Compass Dots -->
    <circle cx="100" cy="10" r="2.5" fill="#C5A059" />
    <circle cx="100" cy="190" r="2.5" fill="#C5A059" />
    <circle cx="10" cy="100" r="2.5" fill="#C5A059" />
    <circle cx="190" cy="100" r="2.5" fill="#C5A059" />
    
    <!-- Diagonal Accent Dots -->
    <circle cx="163.64" cy="163.64" r="1.5" fill="#C5A059" />
    <circle cx="36.36" cy="36.36" r="1.5" fill="#C5A059" />
    <circle cx="163.64" cy="36.36" r="1.5" fill="#C5A059" />
    <circle cx="36.36" cy="163.64" r="1.5" fill="#C5A059" />

    <!-- Stylized Serif Letter "H" -->
    <g fill="#C5A059">
        <!-- Left Stem -->
        <rect x="70" y="55" width="12" height="90" />
        <!-- Top Left Serif Flare -->
        <polygon points="60,55 94,55 88,62 66,62" />
        <!-- Bottom Left Serif Flare -->
        <polygon points="60,145 94,145 88,138 66,138" />
        
        <!-- Right Stem -->
        <rect x="118" y="55" width="12" height="90" />
        <!-- Top Right Serif Flare -->
        <polygon points="108,55 142,55 136,62 114,62" />
        <!-- Bottom Right Serif Flare -->
        <polygon points="108,145 142,145 136,138 114,138" />
        
        <!-- Center Crossbar -->
        <rect x="82" y="96" width="36" height="8" />
    </g>
</svg>
